name: WAF probe (tulospalvelu)

# Temporary diagnostic: does a browser-TLS-impersonated request (curl_cffi)
# bypass the tulospalvelu CloudFront/AWS WAF from a data-center IP?
# GitHub-hosted runners share Azure/Microsoft IP space with our SWA, so this
# reproduces the same network conditions that block our Azure Function.
# Safe to delete after we have the answer.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/waf-probe.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install clients
        run: pip install --quiet curl_cffi requests
      - name: Probe tulospalvelu from data-center IP
        run: |
          python - <<'PY'
          import re, sys, requests
          from curl_cffi import requests as cffi

          HOME = "https://tulospalvelu.leijonat.fi/?lang=fi"
          SEASONS = "https://tulospalvelu.leijonat.fi/helpers/getseasons"
          cffi_ok = False

          def tok(html):
              m = re.search(r'id="xsrf-token"[^>]*value="([^"]+)"', html or "")
              return m.group(1) if m else None

          print("=== egress IP ===")
          try:
              print("ip:", requests.get("https://api.ipify.org", timeout=20).text)
          except Exception as e:
              print("ip lookup failed:", e)

          print("=== A) plain requests (non-browser TLS) ===")
          try:
              r = requests.get(HOME, timeout=30)
              print(f"PROBE plain home -> status={r.status_code} bytes={len(r.text)} token={'YES' if tok(r.text) else 'NO'}")
          except Exception as e:
              print("plain failed:", e)

          print("=== B) curl_cffi impersonate=chrome (browser TLS) ===")
          try:
              s = cffi.Session(impersonate="chrome")
              r = s.get(HOME, timeout=30)
              t = tok(r.text)
              cffi_ok = bool(t)
              print(f"PROBE cffi  home -> status={r.status_code} bytes={len(r.text)} token={'YES' if t else 'NO'}")
              if t:
                  r2 = s.get(SEASONS, headers={
                      "x-csrf-token": t,
                      "x-requested-with": "XMLHttpRequest",
                      "Accept": "application/json",
                  }, timeout=30)
                  print(f"PROBE cffi  seasons -> status={r2.status_code} body={r2.text[:100]!r}")
          except Exception as e:
              print("cffi failed:", e)

          print("=== VERDICT: if 'cffi home' token=YES from a data-center IP, curl_cffi is the fix ===")
          # Exit 0 (green run) iff curl_cffi bypassed the WAF -> readable via public API.
          sys.exit(0 if cffi_ok else 1)
          PY
