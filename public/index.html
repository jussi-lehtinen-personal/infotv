<!DOCTYPE html>
<html lang="fi" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111111">
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    <meta
      name="description"
      content="Ahma Gamezone"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ahma Gamezone" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
	<link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
	<link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Archivo otsikoille (AHMA GAMEZONE — leveämpi block-bold display,
         variable wght 100..900) + Outfit UI:lle -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Outfit:wght@300..900&display=swap" rel="stylesheet" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->

    <title>Ahma Gamezone</title>

    <!-- Branded loading screen. It lives OUTSIDE #root (a sibling), so React's
         createRoot() never clears it — src/index.js removes it (fade-out) once
         the app has mounted AND a short minimum has elapsed, so it's still
         visible on an instant, fully-cached PWA launch. Inline + colours
         hardcoded because this paints BEFORE the CSS bundle (no tokens yet). -->
    <script>window.__splashStart = Date.now();</script>
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background:
          radial-gradient(130% 90% at 50% -10%, #221d13 0%, rgba(17,17,17,0) 55%),
          #111111;
        font-family: 'Archivo', system-ui, -apple-system, sans-serif;
        opacity: 1; transition: opacity 0.4s ease;
      }
      #app-splash.sp-out { opacity: 0; pointer-events: none; }
      #app-splash .sp-in {
        display: flex; flex-direction: column; align-items: center; gap: 20px;
        animation: sp-in 0.5s ease both;
      }
      #app-splash .sp-logo {
        width: 150px; height: 150px; display: block; object-fit: contain;
        filter: drop-shadow(0 8px 30px rgba(245, 158, 11, 0.35));
        animation: sp-pulse 2.4s ease-in-out infinite;
      }
      #app-splash .sp-title {
        font-size: 22px; font-weight: 800; letter-spacing: 0.16em;
        color: #ffffff; text-transform: uppercase;
      }
      #app-splash .sp-title b { color: #f59e0b; font-weight: 800; }
      #app-splash .sp-bar {
        width: 150px; height: 4px; border-radius: 2px;
        background: rgba(255, 255, 255, 0.08); overflow: hidden;
      }
      #app-splash .sp-bar i {
        display: block; width: 40%; height: 100%; border-radius: 2px;
        background: #f59e0b; animation: sp-slide 1.15s ease-in-out infinite;
      }
      @keyframes sp-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @keyframes sp-slide { 0% { margin-left: -45%; } 100% { margin-left: 105%; } }
      @keyframes sp-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .sp-logo, #app-splash .sp-bar i, #app-splash .sp-in { animation: none; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app-splash">
      <div class="sp-in">
        <img class="sp-logo" src="%PUBLIC_URL%/gamezone_3d.webp" alt="" />
        <div class="sp-title">Ahma <b>Gamezone</b></div>
        <div class="sp-bar"><i></i></div>
      </div>
    </div>
    <div id="root"></div>
    <!-- Cloudflare Web Analytics (cookieless, no consent banner needed). Beacon
         auto-tracks SPA route changes via the History API. -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "1ffc0a870783466cb10c3d16b1da9eaa"}'></script>
    <!-- End Cloudflare Web Analytics -->

  </body>
</html>
