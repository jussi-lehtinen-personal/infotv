# `name` MUST match the existing Worker (gamezone.zapmies.workers.dev) so wrangler
# updates it rather than creating a new one — the Azure passthrough URL is hardcoded.
name = "gamezone"
main = "src/index.js"
compatibility_date = "2024-11-01"

# PROXY_KEY is set as a secret (not here):
#   wrangler secret put PROXY_KEY
# or in the dashboard: Worker -> Settings -> Variables -> add encrypted PROXY_KEY.
# When unset, the Worker serves without auth (fine for the Phase-1 validation).

# Persistent map ext-id -> real getgames GameID for the box score (see
# project_boxscore_plan). The mapping never changes, so KV is a permanent cache;
# the code degrades gracefully (re-resolves) if the binding is absent.
[[kv_namespaces]]
binding = "GAME_IDS"
id = "1ed1f45544974010976093924eae98e0"

# Cron trigger: steps the Ahmaliiga sim clock (1 sim-day / 30 min). CF cron fires
# reliably, unlike GitHub Actions' best-effort schedule. The `scheduled` handler
# POSTs /api/runAhmaliigaTick with AHMALIIGA_CRON_KEY (a Worker secret — set with
# `wrangler secret put AHMALIIGA_CRON_KEY`, same value as the SWA app-setting).
[triggers]
crons = ["7,37 * * * *"]
