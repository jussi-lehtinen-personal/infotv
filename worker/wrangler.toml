# `name` MUST match the existing Worker (gamezone.zapmies.workers.dev) so wrangler
# updates it rather than creating a new one — the Azure passthrough URL is hardcoded.
name = "gamezone"
main = "src/index.js"
compatibility_date = "2024-11-01"

# PROXY_KEY is set as a secret (not here):
#   wrangler secret put PROXY_KEY
# or in the dashboard: Worker -> Settings -> Variables -> add encrypted PROXY_KEY.
# When unset, the Worker serves without auth (fine for the Phase-1 validation).
